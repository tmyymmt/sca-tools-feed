name: Update Feeds

on:
  schedule:
    - cron: "0 1 * * *"  # 毎日 UTC 01:00 (JST 10:00)
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write          # data/ のコミット・プッシュ
  pages: write             # GitHub Pages へのデプロイ
  id-token: write          # OIDC 認証（Pages デプロイに必要）
  issues: write            # 失敗時の Issue 作成

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and generate feeds and pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FEED_BASE_URL: "https://tmyymmt.github.io/sca-tools-feed/feeds"
        run: python -m scripts.main

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update data $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Feed update failed on ${new Date().toISOString().split('T')[0]}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['feed-failure'],
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The daily feed update workflow failed.\n\n[See run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                labels: ['feed-failure'],
              });
            }
